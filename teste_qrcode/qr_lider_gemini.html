<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Scanner do Líder</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>

    <h2>Aponte a câmera</h2>
    
    <div id="leitor-camera" style="width: 300px; margin: auto;"></div>
    
    <h3 id="resultado" style="text-align: center; color: green;"></h3>

    <script>
        // 4. O que fazer quando a câmera achar um código?
        function sucessoNaLeitura(textoDecodificado) {
            // Pega o h3 pelo ID e escreve o texto que a câmera leu
            document.getElementById("resultado").innerText = "Código Lido: " + textoDecodificado;
            
            // Opcional: faz o celular vibrar para o líder saber que leu
            if (navigator.vibrate) navigator.vibrate(200); 
        }

        function erroNaLeitura(erro) {
            // Aqui a gente ignora, senão o console fica cheio de erros enquanto a câmera procura
        }

        // 5. Configurar e ligar o Scanner
        let scanner = new Html5QrcodeScanner(
            "leitor-camera", // O ID da div onde a câmera abre
            { fps: 10, qrbox: {width: 200, height: 200} }, // Configurações (10 quadros por seg)
            false // Ocultar mensagens complexas de erro
        );

        // Dá o play na câmera
        scanner.render(sucessoNaLeitura, erroNaLeitura);
    </script>

</body>
</html>
