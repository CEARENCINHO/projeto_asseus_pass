<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Carteirinha do Aluno</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

    <h2>Sua Carteirinha Digital</h2>
    
    <div id="caixa-do-qr"></div>

    <script>
        // 3. O JavaScript chamando a ferramenta
        // Pegamos a div pelo ID e passamos o texto e o tamanho
        new QRCode(document.getElementById("caixa-do-qr"), {
            text: "ALUNO-JOHN-MARLEY-123", // O que o scanner vai ler
            width: 200, // Largura
            height: 200, // Altura
            colorDark : "#000000", // Cor do código
            colorLight : "#ffffff" // Cor do fundo
        });
    </script>

</body>
</html>
